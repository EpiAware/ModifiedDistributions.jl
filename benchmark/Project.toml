# PACKAGE-OWNED — scaffold writes this once and never overwrites it.
# The benchmark environment, so `julia --project=benchmark benchmark/run.jl`
# resolves. Seeded with BenchmarkTools, the package, and the shared
# EpiAwarePackageTools benchmark harness; the AD-backend deps drive the
# gradient suite (`benchmark/src/ad_gradients.jl`). EpiAwarePackageTools is
# pinned by git via `[sources]` until it is registered (mirror the test env's
# pin if you switch to a path).
[deps]
ADFixtures = "114781d2-3049-4c58-b3ab-bb4a1376abee"
ADTypes = "47edcb42-4c32-4615-8424-f2b9edc5f35b"
BenchmarkTools = "6e4b80f9-dd63-53aa-95a3-0cdb28fa8baf"
ComposedDistributions = "2f642b71-32a9-4f47-97c4-6deb7517f7a7"
ConvolvedDistributions = "f5b942c9-bc5b-4664-8486-7f531bb06742"
DifferentiationInterface = "a0c0ee7d-e4b9-4e03-894e-1c5f64a51d63"
DifferentiationInterfaceTest = "a82114a7-5aa3-49a8-9643-716bb13727a3"
Distributions = "31c24e10-a181-5473-b8eb-7969acd0382f"
Enzyme = "7da242da-08ed-463a-9acd-ee780be4f1d9"
EpiAwareADTools = "908e2895-a690-4874-a954-ca006cb9734d"
EpiAwarePackageTools = "7aaea248-0d11-4a0d-a7dc-86da30abb951"
ForwardDiff = "f6369f11-7733-5829-9624-2563aa707210"
Mooncake = "da2b9cff-9c12-43a0-ae48-6db2b0edb7d6"
ReverseDiff = "37e2e3b7-166d-5795-8a7a-e32c996b4267"
ModifiedDistributions = "664e6f8c-d74f-44d3-9f37-f82699103046"

[sources]
ADFixtures = {path = "../test/ADFixtures"}
ModifiedDistributions = {path = ".."}
# Until EpiAwarePackageTools is registered, it is pinned by git so
# the env resolves out of the box. Switch to a local path to
# develop the kit alongside this package.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
# ComposedDistributions (the ModifiedDistributionsComposedDistributionsExt
# trigger, exercised by the Sequential AD scenario) and its hard-dep
# ConvolvedDistributions are unregistered, so both are pinned by git.
# ConvolvedDistributions must be a direct dep here because `[sources]`
# entries only apply to the active project's direct dependencies.
# TEMPORARY: ComposedDistributions main still caps ConvolvedDistributions at
# 0.1; pin its 0.2-adoption branch (#136). Revert to rev = "main" after #136 merges.
ComposedDistributions = {url = "https://github.com/EpiAware/ComposedDistributions.jl", rev = "fix/convolved-0.2-compat"}
ConvolvedDistributions = {url = "https://github.com/EpiAware/ConvolvedDistributions.jl", rev = "main"}
# EpiAwareADTools is a new hard dependency of ConvolvedDistributions 0.2 and is
# itself unregistered, so it must be pinned by git and named a direct dep here
# (`[sources]` entries only apply to the active project's direct dependencies).
EpiAwareADTools = {url = "https://github.com/EpiAware/EpiAwareADTools.jl", rev = "main"}

[compat]
BenchmarkTools = "1"
Distributions = "0.25"
