# MANAGED by EpiAwarePackageTools.scaffold — do not edit by hand.
name: pre-commit

on:
  pull_request:
  push:
    branches: [main]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    uses: EpiAware/.github/.github/workflows/format-check.yml@dc919e0d1674c16d1518df07eda5ee0be09b47e2
    # Pin the CI formatter to the same version as the local pre-commit hook and
    # the isolated formatter env (single source: `2.10.1`).
    # Without this the shared workflow installs its own default and reformats
    # code the pinned local formatter left intact, failing the check (#114).
    with:
      juliaformatter_version: '2.10.1'
    secrets: inherit  # pragma: allowlist secret
