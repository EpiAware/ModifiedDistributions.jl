# PACKAGE-OWNED — scaffold writes this once and never overwrites it.
# The documentation environment: Documenter + DocumenterVitepress (the org docs
# standard). Add doc-only deps (e.g. plotting, DocumenterCitations) here as the
# docs grow. The package itself is pinned by path via `[sources]`.
[deps]
AlgebraOfGraphics = "cbdf2221-f076-402e-a563-3d30da359d67"
CairoMakie = "13f3f980-e62b-5c42-98c6-ff1f3baf88f0"
ComposedDistributions = "2f642b71-32a9-4f47-97c4-6deb7517f7a7"
ConvolvedDistributions = "f5b942c9-bc5b-4664-8486-7f531bb06742"
Distributions = "31c24e10-a181-5473-b8eb-7969acd0382f"
Documenter = "e30172f5-a6a5-5a46-863b-614d45cd2de4"
DocumenterCitations = "daee34ce-89f3-4625-b898-19384cb65244"
DocumenterVitepress = "4710194d-e776-4893-9690-8d956a29c365"
EpiAwareADTools = "908e2895-a690-4874-a954-ca006cb9734d"
EpiAwarePackageTools = "7aaea248-0d11-4a0d-a7dc-86da30abb951"
Literate = "98b081ad-f1c9-55d3-8b20-4c87d4299306"
ModifiedDistributions = "664e6f8c-d74f-44d3-9f37-f82699103046"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"

[sources]
ModifiedDistributions = {path = ".."}
# docs/make.jl drives the build through EpiAwarePackageTools.DocsBuild; until
# the kit is registered it is pinned by git, mirroring test/Project.toml.
EpiAwarePackageTools = {url = "https://github.com/EpiAware/EpiAwarePackageTools.jl", rev = "main"}
# ComposedDistributions (the ModifiedDistributionsComposedDistributionsExt
# trigger, used by the composed-chains tutorial) and its hard-dep
# ConvolvedDistributions are unregistered, so both are pinned by git.
# ConvolvedDistributions must be a direct dep here because `[sources]` entries
# only apply to the active project's direct dependencies.
# TEMPORARY: ComposedDistributions pinned to its 0.2-adoption branch (#136);
# its main still caps ConvolvedDistributions at 0.1. Revert to rev = "main"
# once #136 merges.
ComposedDistributions = {url = "https://github.com/EpiAware/ComposedDistributions.jl", rev = "fix/convolved-0.2-compat"}
ConvolvedDistributions = {url = "https://github.com/EpiAware/ConvolvedDistributions.jl", rev = "main"}
# EpiAwareADTools is a new hard dependency of ConvolvedDistributions 0.2 and is
# itself unregistered, so it must be pinned by git and named a direct dep here
# (`[sources]` entries only apply to the active project's direct dependencies).
EpiAwareADTools = {url = "https://github.com/EpiAware/EpiAwareADTools.jl", rev = "main"}

[compat]
AlgebraOfGraphics = "0.12"
CairoMakie = "0.15"
Distributions = "0.25"
Documenter = "1"
DocumenterCitations = "1"
DocumenterVitepress = "0.3"
Literate = "2"
Random = "1"
